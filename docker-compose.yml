services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: manicuredb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 en el host para no chocar con el PostgreSQL nativo de Windows (5432)
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # 6379 expuesto al host para poder usarlo también desde el runserver nativo
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A nail_salon_api worker --loglevel=info
    volumes:
      - .:/app
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
