<!DOCTYPE html>
<html lang="es">
{% load static %}

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Hi Agenda!</title>

	<!-- Bootstrap CSS -->
	<link href="{% static 'css/libs/bootstrap_v5.3.3/bootstrap.min.css' %}" rel="stylesheet">

	<!-- Google Material Symbols -->
	<link href="{% static 'css/libs/google_fonts/css2.css' %}" rel="stylesheet">
	<link href="{% static 'css/custom/custom.icons.css' %}" rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', system-ui, sans-serif;
			background: linear-gradient(135deg, #faf9f6 0%, #f5f3f0 50%, #f0ede8 100%);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
			line-height: 1.5;
			position: relative;
			overflow: hidden;
		}

		/* Soft Background */
		.soft-background {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 0;
			pointer-events: none;
		}

		.floating-shapes {
			position: absolute;
			width: 100%;
			height: 100%;
		}

		.soft-blob {
			position: absolute;
			border-radius: 50% 40% 60% 30%;
			background: linear-gradient(45deg, rgba(240, 206, 170, 0.4), rgba(224, 190, 156, 0.3));
			animation: softFloat 12s ease-in-out infinite;
			filter: blur(80px);
		}

		.blob-1 {
			width: 300px;
			height: 250px;
			top: -10%;
			left: -5%;
			animation-delay: 0s;
		}

		.blob-2 {
			width: 200px;
			height: 180px;
			top: 60%;
			right: -5%;
			animation-delay: -4s;
			background: linear-gradient(45deg, rgba(210, 180, 140, 0.3), rgba(195, 165, 125, 0.2));
		}

		.blob-3 {
			width: 180px;
			height: 160px;
			top: 20%;
			right: 20%;
			animation-delay: -8s;
			background: linear-gradient(45deg, rgba(230, 200, 160, 0.25), rgba(215, 185, 145, 0.2));
		}

		.blob-4 {
			width: 120px;
			height: 100px;
			bottom: 10%;
			left: 15%;
			animation-delay: -6s;
			background: linear-gradient(45deg, rgba(220, 190, 150, 0.3), rgba(205, 175, 135, 0.25));
		}

		@keyframes softFloat {

			0%,
			100% {
				transform: translate(0, 0) rotate(0deg) scale(1);
				border-radius: 50% 40% 60% 30%;
			}

			25% {
				transform: translate(30px, -20px) rotate(90deg) scale(1.1);
				border-radius: 40% 60% 30% 50%;
			}

			50% {
				transform: translate(-20px, -30px) rotate(180deg) scale(0.9);
				border-radius: 60% 30% 50% 40%;
			}

			75% {
				transform: translate(-30px, 20px) rotate(270deg) scale(1.05);
				border-radius: 30% 50% 40% 60%;
			}
		}

		/* Card & Container */
		.login-container {
			width: 100%;
			max-width: 420px;
			position: relative;
			z-index: 1;
		}

		.soft-card {
			background: rgba(255, 255, 255, 0.85);
			backdrop-filter: blur(20px);
			border-radius: 32px;
			padding: 48px 40px;
			box-shadow:
				0 20px 40px rgba(0, 0, 0, 0.03),
				0 8px 24px rgba(0, 0, 0, 0.02),
				inset 0 1px 0 rgba(255, 255, 255, 0.8);
			border: 1px solid rgba(255, 255, 255, 0.4);
			position: relative;
			overflow: hidden;
		}

		.soft-card::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 1px;
			background: linear-gradient(90deg, transparent, rgba(240, 206, 170, 0.5), transparent);
		}

		/* Header */
		.comfort-header {
			text-align: center;
			margin-bottom: 40px;
		}

		.comfort-icon {
			margin: 0 auto 24px;
			text-align: center;
		}

		.comfort-title {
			color: #8b6655;
			font-size: 2rem;
			font-weight: 600;
			margin-bottom: 8px;
			letter-spacing: -0.02em;
		}

		.gentle-subtitle {
			color: rgba(139, 102, 85, 0.7);
			font-size: 15px;
			font-weight: 400;
		}

		/* Form Fields */
		.soft-field {
			position: relative;
			margin-bottom: 24px;
		}

		.field-container {
			position: relative;
			background: rgba(255, 255, 255, 0.7);
			border: 1.5px solid rgba(240, 206, 170, 0.3);
			border-radius: 16px;
			overflow: hidden;
			transition: all 0.3s ease;
		}

		.field-container:focus-within {
			border-color: #f0ceaa;
			box-shadow: 0 0 0 3px rgba(240, 206, 170, 0.1);
			background: rgba(255, 255, 255, 0.9);
		}

		.soft-field input {
			width: 100%;
			background: transparent;
			border: none;
			padding: 18px 16px;
			color: #8b6655;
			font-size: 15px;
			font-weight: 400;
			outline: none;
			position: relative;
			z-index: 2;
			font-family: inherit;
		}

		.soft-field input::placeholder {
			color: transparent;
		}

		.soft-field label {
			position: absolute;
			left: 16px;
			top: 50%;
			transform: translateY(-50%);
			color: rgba(139, 102, 85, 0.6);
			font-size: 15px;
			font-weight: 400;
			pointer-events: none;
			transition: all 0.3s ease;
			z-index: 3;
		}

		.soft-field input:focus+label,
		.soft-field input:not(:placeholder-shown)+label {
			top: 4px;
			font-size: 10px;
			color: #8b6655;
			transform: translateY(0);
			font-weight: 500;
		}

		.field-accent {
			position: absolute;
			bottom: 0;
			left: 0;
			width: 0;
			height: 2px;
			background: linear-gradient(90deg, #f0ceaa, #e0be9c);
			transition: width 0.3s ease;
			border-radius: 2px;
		}

		.field-container:focus-within .field-accent {
			width: 100%;
		}

		/* Password Toggle */
		.soft-field:has(.gentle-toggle) input {
			padding-right: 56px;
		}

		.gentle-toggle {
			position: absolute;
			right: 12px;
			top: 50%;
			transform: translateY(-50%);
			background: none;
			border: none;
			cursor: pointer;
			z-index: 4;
			padding: 8px;
			border-radius: 12px;
			transition: all 0.2s ease;
		}

		.gentle-toggle .material-symbols-outlined {
			font-size: 20px;
			color: rgba(139, 102, 85, 0.6);
			transition: color 0.2s ease;
		}

		.gentle-toggle:hover {
			background: rgba(240, 206, 170, 0.1);
		}

		.gentle-toggle:hover .material-symbols-outlined {
			color: #8b6655;
		}

		.eye-closed {
			display: none;
		}

		.gentle-toggle.toggle-active .eye-open {
			display: none;
		}

		.gentle-toggle.toggle-active .eye-closed {
			display: inline;
		}

		/* Error Alert */
		.gentle-alert {
			background: rgba(217, 119, 87, 0.08);
			border: 1px solid rgba(217, 119, 87, 0.25);
			border-radius: 12px;
			padding: 12px 16px;
			margin-bottom: 24px;
			color: #d97757;
			font-size: 14px;
			font-weight: 400;
			text-align: center;
		}

		/* Comfort Button */
		.comfort-button {
			width: 100%;
			background: transparent;
			color: #8b6655;
			border: none;
			border-radius: 16px;
			padding: 0;
			cursor: pointer;
			font-family: inherit;
			font-size: 15px;
			font-weight: 500;
			position: relative;
			margin-top: 8px;
			overflow: hidden;
			min-height: 54px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.3s ease;
		}

		.button-background {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: linear-gradient(135deg, #f0ceaa 0%, #e0be9c 100%);
			transition: all 0.3s ease;
			border-radius: 16px;
		}

		.comfort-button:hover {
			transform: translateY(-1px);
		}

		.comfort-button:hover .button-background {
			background: linear-gradient(135deg, #ebc49a 0%, #dbb88c 100%);
			box-shadow: 0 8px 16px rgba(240, 206, 170, 0.4);
		}

		.comfort-button:active {
			transform: translateY(0);
		}

		.button-text {
			position: relative;
			z-index: 2;
		}

		.button-glow {
			position: absolute;
			top: -2px;
			left: -2px;
			right: -2px;
			bottom: -2px;
			background: linear-gradient(135deg, #f0ceaa, #e0be9c);
			border-radius: 18px;
			opacity: 0;
			filter: blur(8px);
			transition: opacity 0.3s ease;
			z-index: -1;
		}

		.comfort-button:hover .button-glow {
			opacity: 0.4;
		}

		/* Footer */
		.comfort-footer {
			text-align: center;
			margin-top: 32px;
			color: rgba(139, 102, 85, 0.5);
			font-size: 13px;
		}

		/* Mobile Responsive */
		@media (max-width: 480px) {
			body {
				padding: 16px;
			}

			.soft-card {
				padding: 36px 28px;
				border-radius: 24px;
			}

			.comfort-title {
				font-size: 1.75rem;
			}

			.floating-shapes {
				opacity: 0.5;
			}

			.soft-blob {
				filter: blur(60px);
			}
		}
	</style>
</head>

<body>
	<div class="soft-background">
		<div class="floating-shapes">
			<div class="soft-blob blob-1"></div>
			<div class="soft-blob blob-2"></div>
			<div class="soft-blob blob-3"></div>
			<div class="soft-blob blob-4"></div>
		</div>
	</div>

	<div class="login-container">
		<div class="soft-card">
			<div class="comfort-header">
				<div class="comfort-icon">
				</div>
				<h1 class="comfort-title">Bienvenido</h1>
				<p class="gentle-subtitle">Inicia sesión en tu espacio</p>
			</div>

			{% if form.errors %}
			<div class="gentle-alert" role="alert">
				Usuario o contraseña incorrectos.
			</div>
			{% endif %}

			<form method="post">
				{% csrf_token %}
				<div class="soft-field">
					<div class="field-container">
						<input type="text" name="username" id="id_username" placeholder=" " required autofocus
							value="{{ form.username.value|default:'' }}">
						<label for="id_username">Usuario</label>
						<div class="field-accent"></div>
					</div>
				</div>

				<div class="soft-field">
					<div class="field-container">
						<input type="password" name="password" id="id_password" placeholder=" " required>
						<label for="id_password">Contraseña</label>
						<button type="button" class="gentle-toggle" id="passwordToggle"
							aria-label="Mostrar u ocultar contraseña">
							<span class="material-symbols-outlined eye-open">visibility</span>
							<span class="material-symbols-outlined eye-closed">visibility_off</span>
						</button>
						<div class="field-accent"></div>
					</div>
				</div>

				<button type="submit" class="comfort-button">
					<div class="button-background"></div>
					<span class="button-text">Ingresar</span>
					<div class="button-glow"></div>
				</button>
			</form>

			<p class="comfort-footer">&copy; {% now "Y" %}</p>
		</div>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const toggle = document.getElementById('passwordToggle');
			const passwordInput = document.getElementById('id_password');

			toggle.addEventListener('click', function () {
				const type = passwordInput.type === 'password' ? 'text' : 'password';
				passwordInput.type = type;
				toggle.classList.toggle('toggle-active', type === 'text');
			});

			// Soft focus effects
			document.querySelectorAll('.field-container').forEach(function (container) {
				const input = container.querySelector('input');
				input.addEventListener('focus', function () {
					container.style.transform = 'translateY(-1px)';
				});
				input.addEventListener('blur', function () {
					container.style.transform = 'translateY(0)';
				});
			});
		});
	</script>
</body>

</html>
