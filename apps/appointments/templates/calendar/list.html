{% extends "base.html" %}

{% block view_title %}
Calendario
{% endblock %}

{% block content %}
<section>
  <section class="table-calendar-container--custom">
    <table id="calendar_table" class="table table-calendar--custom">
      <thead>
        <tr>
          <th scope="col" class="text-center">Lunes</th>
          <th scope="col" class="text-center">Martes</th>
          <th scope="col" class="text-center">Miércoles</th>
          <th scope="col" class="text-center">Jueves</th>
          <th scope="col" class="text-center">Viernes</th>
          <th scope="col" class="text-center">Sábado</th>
          <th scope="col" class="text-center">Domingo</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </section>
</section>

{% include "calendar/_welcome_modal.html" %}
{% endblock %}
{% block extra_js %}
<script>
  const canCreateAgenda = '{{ can_create_agenda }}' === 'True';
  $(() => {
    if (!canCreateAgenda) {
      $('#welcomeModal').modal('show');
    }
    const filterData = {
      months: $('#{{ filter_form.months.id_for_label }}').val() || '{{ initial_month }}',
      search: '',
    };

    const totalsItem = (type, amount, label) => `
      <div class="totals-item totals-item-${type}" title="${label}">
        <span class="totals-item-icon" aria-hidden="true"></span>
        <p class="totals-item-amount">${amount}</p>
      </div>`;

    const totalsDisplay = (pendingTotals, completedTotals, isAllCompleted) => {
      if (pendingTotals === 0 && completedTotals === 0) return '';
      // Día completo: solo el check + total, centrados.
      if (isAllCompleted || pendingTotals === 0) {
        return `<div class="totals-container totals-container--single">
          ${totalsItem('completed', completedTotals, 'Día completado')}
        </div>`;
      }
      // Solo pendientes: mismo trato, ícono + total centrados.
      if (completedTotals === 0) {
        return `<div class="totals-container totals-container--single">
          ${totalsItem('pending', pendingTotals, 'Citas pendientes')}
        </div>`;
      }
      // Mixto: ambos bloques (íconos y texto más grandes).
      return `<div class="totals-container totals-container--dual">
        ${totalsItem('pending', pendingTotals, 'Citas pendientes')}
        ${totalsItem('completed', completedTotals, 'Citas completadas')}
      </div>`;
    }

    // Devuelve el atributo style con la variable --progress (porcentaje de
    // citas completadas). El gradiente success/warning de .day-card la lee.
    const progressStyle = (pendingTotals, completedTotals, isAllCompleted) => {
      const total = pendingTotals + completedTotals;
      if (total === 0) return '';
      const percent = isAllCompleted ? 100 : Math.round((completedTotals / total) * 100);
      return `style="--progress: ${percent}%"`;
    }

    const dayColumn = ({ day, in_month, is_today, is_past_date, calendar_appointments_url, ...arguments }) => {
      const {
        pending_totals: pendingTotals = 0,
        completed_totals: completedTotals = 0,
        is_all_completed: isAllCompleted = false,
      } = arguments;
      const hasAppointments = (pendingTotals + completedTotals) > 0;
      const allDone = hasAppointments && (isAllCompleted || pendingTotals === 0);
      const pendingOnly = hasAppointments && !allDone && completedTotals === 0;
      const showProgress = in_month && hasAppointments;
      const dayState = is_today ? 'text--today' : is_past_date ? 'text--past' : '';
      const statusClass = allDone ? 'text--done' : pendingOnly ? 'text--pending' : '';
      return `<a class="day-card ${in_month ? '' : 'day-card--disabled'} ${showProgress ? 'day-card--progress' : ''}"
        ${showProgress ? progressStyle(pendingTotals, completedTotals, isAllCompleted) : ''}
        href="${calendar_appointments_url}">
        <div class="day-card-header">
          <p class="text ${dayState} ${statusClass}">${day}</p>
        </div>
        <div class="day-card-body">
          ${totalsDisplay(pendingTotals, completedTotals, isAllCompleted)}
        </div>
      </a>`;
    }

    const dataTableConfig = {
      tableID: '#calendar_table',
      url: '{{ url_calendar_list }}',
      requestData: filterData,
      columns: [
        { data: ({ monday }) => dayColumn(monday), className: "day-card-container", width: "14.2%" },
        { data: ({ tuesday }) => dayColumn(tuesday), className: "day-card-container", width: "14.2%" },
        { data: ({ wednesday }) => dayColumn(wednesday), className: "day-card-container", width: "14.2%" },
        { data: ({ thursday }) => dayColumn(thursday), className: "day-card-container", width: "14.2%" },
        { data: ({ friday }) => dayColumn(friday), className: "day-card-container", width: "14.2%" },
        { data: ({ saturday }) => dayColumn(saturday), className: "day-card-container", width: "14.2%" },
        { data: ({ sunday }) => dayColumn(sunday), className: "day-card-container", width: "14.2%" },
      ],
      extraConfig: {
        ordering: false,
        paging: false,
        info: false,
        searching: false,
        layout: {
          topStart: () => `
						<div class="input-group">
							<span class="input-group-text">
								<img src="/static/images/common/calendar_month.svg" alt="" width="20" height="20">
							</span>
							{{ filter_form.months }}
						</div>
					`,
          topEnd: () => `
						<div class="dt-search">
							<input type="search" id="id_calendar_search" name="search"
								placeholder="Buscar cliente" aria-label="Buscar cliente"
								autocomplete="off" />
						</div>
					`,
        },
        drawCallback: () => {
          initializeMonthPickers();
        },
      },
    };
    const calendarTable = renderDataTable(dataTableConfig);
    $('#{{ filter_form.months.id_for_label }}').on('change', ({ target }) => {
      filterData[target.name] = target.value;
      calendarTable.draw();
    });

    let searchDebounce;
    $(document).on('input', '#id_calendar_search', ({ target }) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        filterData.search = target.value.trim();
        calendarTable.draw();
      }, 400);
    });
  })
</script>
{% endblock %}
